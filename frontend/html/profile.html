<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/css/profile.css"/>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div>
        <div class="logo">Novaat</div>

        <div class="welcome-card">
          <div class="avatar small-avatar">A</div>
          <div>
            <p class="muted">Welcome,</p>
            <h3>Alexandr Kalinin</h3>
          </div>
        </div>

        <nav class="nav">
          <a href="#" class="nav-item">
            <span class="icon">◫</span>
            <span>Dashboard</span>
          </a>
          <a href="#" class="nav-item">
            <span class="icon">▥</span>
            <span>Strategies</span>
          </a>
          <a href="#" class="nav-item active">
            <span class="icon">⚙</span>
            <span>Settings</span>
          </a>
          <a href="#" class="nav-item">
            <span class="icon">↦</span>
            <span>Log Out</span>
          </a>
        </nav>
      </div>
    </aside>

    <main class="main-content">
      <div class="settings-card">
        <div class="top-header">
          <h1>Settings</h1>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="personal">Personal</button>
          <button class="tab" data-tab="security">Login &amp; Security</button>
          <button class="tab" data-tab="accounts">Accounts &amp; Wallets</button>
        </div>

        <section class="tab-panel active" id="personal">
          <div class="profile-row">
            <div class="avatar large-avatar">A</div>
            <div class="profile-info">
              <h2>Alexandr Kalinin</h2>
              <p>myemail@gmail.com</p>
              <button class="outline-btn" id="changeImageBtn">Change Image</button>
            </div>
          </div>

          <div class="section-title">
            <span>Account Information</span>
            <div class="line"></div>
          </div>

          <form id="settingsForm" class="form-grid">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" value="Alex" />
            </div>

            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" value="Kalinin" />
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <div class="phone-input">
                <select id="countryCode">
                  <option value="+1">🇺🇸 +1</option>
                  <option value="+44">🇬🇧 +44</option>
                  <option value="+998">🇺🇿 +998</option>
                </select>
                <input type="text" id="phone" value="234-2345-234" />
              </div>
            </div>

            <div class="button-row">
              <button type="button" class="ghost-btn" id="cancelBtn">Cancel</button>
              <button type="submit" class="save-btn">Save</button>
            </div>

            <p id="formMessage" class="form-message"></p>
          </form>
        </section>

        <section class="tab-panel" id="security">
          <div class="placeholder-panel">
            <h2>Login &amp; Security</h2>
            <p>Security settings content goes here.</p>
          </div>
        </section>

        <section class="tab-panel" id="accounts">
          <div class="placeholder-panel">
            <h2>Accounts &amp; Wallets</h2>
            <p>Accounts and wallet settings content goes here.</p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="/frontend/javascript/
  "></script>
</body>
</html>
