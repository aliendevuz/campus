<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="./css/log_in.css" />
</head>
<body>

<div class="container">
  
  <!-- LEFT -->
  <div class="left">
    <div class="form-box">
      <h2>LOGIN</h2>
      <p>How to i get started lorem ipsum dolor at?</p>

      <div class="input-group">
        <span>👤</span>
        <input type="text" id="name" placeholder="Name and Surname">
      </div>

      <div class="input-group">
        <span>📧</span>
        <input type="email" id="email" placeholder="E-mail">
      </div>

      <div class="input-group">
        <span>🆔</span>
        <input type="text" id="studentId" placeholder="Student ID">
      </div>

      <div class="input-group">
        <span>🔒</span>
        <input type="password", id="password" placeholder="Password">
      </div>

      <button class="btn" id="loginBtn">Login Now</button>

      <div class="divider"></div>

      <p class="switch-text"><a href="sign_in.html">Sign up</a></p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <img src="./css/image1.png" alt="design">
  </div>

</div>

<script src="./javascript/log_in.js"></script>
</body>
</html>
