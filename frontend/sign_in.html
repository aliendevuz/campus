<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="stylesheet" href="./css/sign_in.css" />
</head>
<body>

<div class="container">
  
  <!-- LEFT SIDE -->
  <div class="left">
    <div class="form-box">
      <h2>SIGN UP</h2>
      <p>How to i get started lorem ipsum dolor at?</p>

      <div class="input-group">
        <span>👤</span>
        <input type="text" id="name" placeholder="Full Name">
      </div>

      <div class="input-group">
        <span>📧</span>
        <input type="email" id="email" placeholder="E-mail">
      </div>

      <div class="input-group">
        <span>🔒</span>
        <input type="password" id="password" placeholder="Password">
      </div>

      <button class="btn" id="registerBtn">Sign Up</button>

      <div class="divider"></div>

      <p class="login-text"><a href="log_in.html">Log in</a></p>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <img src="./css/image1.png" alt="design image">
  </div>

</div>

<script src="./javascript/sign_in.js"></script>
</body>
</html>
